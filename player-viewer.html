<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="robots" content="noindex, nofollow">
    <title>RPG Player Viewer</title>
    <style>
        :root { --bg: #0d0e15; --panel: #151828; --cyan: #00ffff; --magenta: #ff00ff; --inv-slot: #8b8b8b; --inv-bg: #c6c6c6; }
        body { background: var(--bg); color: #fff; font-family: sans-serif; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; }
        
        .main-layout { display: grid; grid-template-columns: 350px 1fr; gap: 20px; margin-top: 20px; }
        
        /* プレイヤーリスト */
        .player-list { background: var(--panel); border-radius: 8px; padding: 15px; height: 75vh; overflow-y: auto; border: 1px solid #333; position: relative; }
        .player-item { padding: 12px; border-bottom: 1px solid #222; cursor: pointer; transition: 0.2s; display: flex; justify-content: space-between; align-items: center; }
        .player-item:hover { background: rgba(0,255,255,0.1); }
        .player-item.active { background: var(--cyan); color: #000; font-weight: bold; }
        .player-item .date { font-size: 0.8rem; color: #777; }

        /* 詳細画面 */
        .detail-view { background: var(--panel); border-radius: 8px; padding: 25px; border: 1px solid #333; display: none; }
        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-bottom: 30px; }
        .stat-card { background: rgba(0,0,0,0.3); padding: 15px; border-radius: 6px; border-left: 3px solid var(--magenta); transition: 0.3s; }
        .stat-card label { font-size: 0.8rem; color: #aaa; display: block; }
        .stat-card span { font-size: 1.2rem; font-weight: bold; }

        /* マイクラ風インベントリ */
        .inventory-container { background: var(--inv-bg); padding: 20px; border-radius: 4px; width: fit-content; margin: 0 auto; border: 2px solid #333; box-shadow: 4px 4px 0 #000; }
        .inv-grid { display: grid; grid-template-columns: repeat(9, 36px); grid-template-rows: repeat(3, 36px); gap: 2px; margin-bottom: 10px; }
        .hotbar-grid { display: grid; grid-template-columns: repeat(9, 36px); gap: 2px; }
        .slot { width: 36px; height: 36px; background: var(--inv-slot); border: 2px solid; border-color: #373737 #fff #fff #373737; display: flex; align-items: center; justify-content: center; position: relative; }
        .slot span.icon { font-size: 20px; user-select: none; }
        .slot .count { position: absolute; bottom: 2px; right: 2px; font-size: 10px; color: #fff; text-shadow: 1px 1px #000; font-family: monospace; font-weight: bold; }
        .slot:hover { background: rgba(255,255,255,0.3); }

        .armor-grid { display: flex; gap: 2px; margin-bottom: 20px; justify-content: center; }
        
        .status-msg { text-align: center; font-weight: bold; padding: 10px; border-radius: 4px; margin-bottom: 10px; }
        .status-ok { background: rgba(0, 255, 255, 0.1); color: var(--cyan); border: 1px solid var(--cyan); }
        .status-error { background: rgba(255, 51, 51, 0.1); color: #ff3333; border: 1px solid #ff3333; }
        
        .back-btn { display: inline-block; color: var(--cyan); text-decoration: none; margin-bottom: 20px; font-weight: bold; }
        .back-btn:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="container">
        <a href="index.html" class="back-btn">◀ ポータルへ戻る</a>
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <h1>Player Data Viewer</h1>
            <div id="statusMsg" class="status-msg status-ok">🟢 データ取得の準備中...</div>
        </div>

        <div class="main-layout">
            <div class="player-list" id="playerList">
                </div>
            <div class="detail-view" id="detailView">
                <h2 id="viewName">Player Name</h2>
                <div class="stats-grid">
                    <div class="stat-card" id="cardCash"><label>所持金</label><span id="viewCash">0 円</span></div>
                    <div class="stat-card" id="cardLevel"><label>レベル</label><span id="viewLevel">1</span></div>
                    <div class="stat-card" id="cardExp"><label>経験値</label><span id="viewExp">0</span></div>
                </div>

                <h3>Inventory (インベントリ)</h3>
                <div class="inventory-container">
                    <div class="armor-grid" id="armorGrid"></div>
                    <div class="inv-grid" id="invGrid"></div>
                    <div class="hotbar-grid" id="hotbarGrid"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let players = [];
        let isFetching = false;
        let activePlayerName = null; // 現在選択中のプレイヤー名を記憶

        // ★ 10秒ごとにサーバーからデータを取得する関数
        function fetchPlayerData() {
            if (isFetching) return;
            isFetching = true;

            fetch('/api/players')
                .then(response => {
                    if (!response.ok) throw new Error('サーバー応答エラー');
                    return response.json();
                })
                .then(data => {
                    players = data;
                    renderPlayerList();
                    
                    // 選択中のプレイヤーがいれば、その詳細画面も最新データに書き換える
                    if (activePlayerName) {
                        const targetIndex = players.findIndex(p => p.name === activePlayerName);
                        if (targetIndex !== -1) {
                            showDetail(targetIndex, null, true); // true = 自動更新モード（画面のチラつき防止）
                        }
                    }

                    const now = new Date();
                    document.getElementById('statusMsg').className = "status-msg status-ok";
                    document.getElementById('statusMsg').textContent = `🟢 自動同期中 (最終更新: ${now.getHours()}:${String(now.getMinutes()).padStart(2, '0')}:${String(now.getSeconds()).padStart(2, '0')})`;
                })
                .catch(err => {
                    console.error(err);
                    document.getElementById('statusMsg').className = "status-msg status-error";
                    document.getElementById('statusMsg').textContent = "🔴 サーバーと通信できません";
                })
                .finally(() => {
                    isFetching = false;
                });
        }

        // ページを開いた瞬間に1回目を取得し、その後10秒(10000ミリ秒)ごとにループさせる
        window.addEventListener('DOMContentLoaded', () => {
            fetchPlayerData();
            setInterval(fetchPlayerData, 10000);
        });

        function renderPlayerList() {
            const list = document.getElementById('playerList');
            list.innerHTML = '';
            
            if (players.length === 0) {
                list.innerHTML = '<p style="color:#777; text-align:center;">プレイしたユーザーデータが存在しません。</p>';
                return;
            }

            players.sort((a, b) => new Date(b.last_seen_date) - new Date(a.last_seen_date));
            
            players.forEach((p, index) => {
                const item = document.createElement('div');
                item.className = 'player-item';
                // 選択中のプレイヤーなら色を付ける
                if (p.name === activePlayerName) {
                    item.classList.add('active');
                }
                
                item.innerHTML = `<div>§6${p.name}</div><div class="date">${p.last_seen_date}</div>`;
                
                item.onclick = () => {
                    activePlayerName = p.name;
                    showDetail(index, item, false);
                };
                list.appendChild(item);
            });
        }

        function showDetail(index, element, isAutoUpdate) {
            const p = players[index];
            document.getElementById('detailView').style.display = 'block';
            
            if (!isAutoUpdate && element) {
                document.querySelectorAll('.player-item').forEach(el => el.classList.remove('active'));
                element.classList.add('active');
            }

            // データが変化したときだけアニメーションさせる（見やすくするため）
            updateValueWithAnimation('viewCash', (p.cash || 0).toLocaleString() + " 円", 'cardCash');
            updateValueWithAnimation('viewLevel', p.level || 1, 'cardLevel');
            updateValueWithAnimation('viewExp', p.exp || 0, 'cardExp');

            document.getElementById('viewName').textContent = p.name;
            renderInventory(p.inventory || []);
        }

        function updateValueWithAnimation(elementId, newValue, cardId) {
            const el = document.getElementById(elementId);
            if (el.textContent !== String(newValue)) {
                el.textContent = newValue;
                const card = document.getElementById(cardId);
                card.style.backgroundColor = "rgba(0, 255, 255, 0.2)";
                setTimeout(() => { card.style.backgroundColor = "rgba(0, 0, 0, 0.3)"; }, 500);
            }
        }

        function renderInventory(inv) {
            const armor = document.getElementById('armorGrid');
            const main = document.getElementById('invGrid');
            const bar = document.getElementById('hotbarGrid');
            armor.innerHTML = ''; main.innerHTML = ''; bar.innerHTML = '';

            for (let i = 0; i < 40; i++) {
                const slot = document.createElement('div');
                slot.className = 'slot';
                
                const item = inv.find(it => it.slot === i);
                if (item) {
                    const iconSpan = document.createElement('span');
                    iconSpan.className = 'icon';
                    iconSpan.title = `${item.id}\n表示名: ${item.name || 'なし'}\n個数: ${item.amount}個`;
                    
                    if (item.id.includes('SWORD')) iconSpan.textContent = '⚔️';
                    else if (item.id.includes('PICKAXE') || item.id.includes('AXE')) iconSpan.textContent = '⛏️';
                    else if (item.id.includes('HELMET') || item.id.includes('CHESTPLATE') || item.id.includes('LEGGINGS') || item.id.includes('BOOTS')) iconSpan.textContent = '🛡️';
                    else if (item.id.includes('BOOK')) iconSpan.textContent = '📖';
                    else iconSpan.textContent = '📦';
                    
                    slot.appendChild(iconSpan);
                    
                    if (item.amount > 1) {
                        const count = document.createElement('div');
                        count.className = 'count';
                        count.textContent = item.amount;
                        slot.appendChild(count);
                    }
                }

                if (i >= 36 && i <= 39) armor.appendChild(slot);
                else if (i >= 9 && i <= 35) main.appendChild(slot);
                else if (i >= 0 && i <= 8) bar.appendChild(slot);
            }
        }
    </script>
</body>
</html>
