<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RPG Config Editor - Neon Dark</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/js-yaml/4.1.0/js-yaml.min.js"></script>
    <style>
        :root { --bg-color: #0d0e15; --panel-bg: #151828; --text-color: #e0e0e0; --neon-cyan: #00ffff; --neon-magenta: #ff00ff; --neon-green: #39ff14; --neon-red: #ff3333; }
        body { background-color: var(--bg-color); color: var(--text-color); font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; padding: 30px; padding-bottom: 250px; }
        h1 { text-align: center; color: #fff; text-shadow: 0 0 10px var(--neon-cyan), 0 0 20px var(--neon-cyan); margin-bottom: 30px; }
        .container { max-width: 1200px; margin: 0 auto; background: var(--panel-bg); padding: 30px; border-radius: 12px; box-shadow: 0 0 20px rgba(0, 255, 255, 0.15); border: 1px solid rgba(0, 255, 255, 0.3); }
        .controls { display: flex; gap: 20px; margin-bottom: 30px; justify-content: center; }
        button.main-btn, .file-upload { background: transparent; color: var(--neon-cyan); border: 2px solid var(--neon-cyan); padding: 12px 25px; font-size: 16px; border-radius: 8px; cursor: pointer; text-transform: uppercase; font-weight: bold; transition: 0.3s; text-shadow: 0 0 5px var(--neon-cyan); box-shadow: 0 0 10px rgba(0, 255, 255, 0.2) inset; }
        button.main-btn:hover, .file-upload:hover { background: var(--neon-cyan); color: #000; box-shadow: 0 0 20px var(--neon-cyan); text-shadow: none; }
        button.download-btn { color: var(--neon-magenta); border-color: var(--neon-magenta); text-shadow: 0 0 5px var(--neon-magenta); box-shadow: 0 0 10px rgba(255, 0, 255, 0.2) inset; }
        button.download-btn:hover { background: var(--neon-magenta); color: #000; box-shadow: 0 0 20px var(--neon-magenta); }
        .file-upload input[type="file"] { display: none; }
        .editor-area { display: flex; flex-direction: column; gap: 12px; }
        .kv-pair { display: flex; flex-wrap: wrap; gap: 15px; align-items: flex-start; background: rgba(0, 0, 0, 0.4); padding: 15px; border-left: 4px solid var(--neon-magenta); margin-left: 15px; border-radius: 4px; transition: 0.2s; }
        .kv-pair:hover { border-left-color: var(--neon-cyan); background: rgba(0, 255, 255, 0.05); }
        .key-header { width: 250px; display: flex; justify-content: space-between; align-items: center; }
        .key-label { font-weight: bold; color: var(--neon-cyan); word-wrap: break-word; text-shadow: 0 0 3px rgba(0, 255, 255, 0.5); }
        input[type="number"], select { flex: 1; min-width: 250px; background: #08080c; color: #fff; border: 1px solid #444; padding: 10px; border-radius: 6px; font-family: monospace; transition: 0.2s; font-size: 15px; }
        input:focus, select:focus { outline: none; border-color: var(--neon-cyan); box-shadow: 0 0 10px rgba(0, 255, 255, 0.5); }
        .mc-field-container { flex: 1; min-width: 250px; position: relative; }
        .rich-mc-editor { background: #08080c; color: #fff; border: 1px solid #444; padding: 10px; border-radius: 6px; font-family: 'Minecraft', 'Segoe UI', monospace; font-size: 15px; min-height: 22px; cursor: text; white-space: pre-wrap; word-break: break-word; transition: 0.2s; text-shadow: 1px 1px 0px #000; outline: none; line-height: 1.5; }
        .rich-mc-editor:focus { border-color: var(--neon-cyan); box-shadow: 0 0 10px rgba(0, 255, 255, 0.5); background: #111; }
        .rich-mc-editor.multiline { min-height: 80px; resize: vertical; overflow: auto; }
        .mc-obf { background-color: #555; color: transparent; text-shadow: none; }
        .nested { width: 100%; display: flex; flex-direction: column; gap: 8px; margin-top: 5px; }
        .array-item { border: 1px dashed var(--neon-magenta); padding: 15px; margin-top: 10px; border-radius: 6px; background: rgba(255, 0, 255, 0.03); }
        .array-header { color: var(--neon-green); font-size: 13px; margin-bottom: 10px; font-weight: bold; text-shadow: 0 0 3px rgba(57, 255, 20, 0.5); display: flex; justify-content: space-between; align-items: center; }
        button.action-btn { background: transparent; border-radius: 4px; cursor: pointer; transition: 0.2s; font-weight: bold; }
        button.add-btn { color: var(--neon-green); border: 1px solid var(--neon-green); padding: 8px 15px; font-size: 14px; text-shadow: 0 0 3px rgba(57, 255, 20, 0.5); align-self: flex-start; margin-top: 10px; box-shadow: 0 0 5px rgba(57, 255, 20, 0.2) inset; }
        button.add-btn:hover { background: var(--neon-green); color: #000; box-shadow: 0 0 15px var(--neon-green); text-shadow: none; }
        button.del-btn { color: var(--neon-red); border: 1px solid var(--neon-red); padding: 4px 10px; font-size: 12px; }
        button.del-btn:hover { background: var(--neon-red); color: #fff; box-shadow: 0 0 10px var(--neon-red); }
        .add-key-group { display: flex; gap: 10px; margin-top: 10px; align-items: center; }
        .add-key-group select, .add-key-group input { min-width: 200px; flex: unset; }
        .book-container { background: #2b2216; border: 2px solid #5a4124; border-radius: 8px; padding: 20px; max-width: 100%; box-sizing: border-box; margin: 10px 0; box-shadow: inset 0 0 20px rgba(0,0,0,0.8); flex: 1; }
        .book-header { text-align: center; color: #d4a373; font-weight: bold; margin-bottom: 10px; font-size: 18px;}
        .book-controls { display: flex; justify-content: space-between; margin-top: 10px; align-items: center; flex-wrap: wrap; gap: 5px; }
        .book-controls button { background: #5a4124; border: 1px solid #7d5b35; color: #e0e0e0; padding: 5px 10px; border-radius: 4px; cursor: pointer; }
        .book-controls button:hover:not(:disabled) { background: #7d5b35; }
        .book-controls button:disabled { opacity: 0.5; cursor: not-allowed; }
        .book-page-info { color: #d4a373; font-size: 14px; font-weight: bold; }
        .color-palette { position: fixed; bottom: 30px; right: 30px; background: rgba(20, 20, 30, 0.95); border: 2px solid var(--neon-cyan); border-radius: 8px; padding: 15px; box-shadow: 0 0 15px rgba(0,255,255,0.3); z-index: 1000; display: flex; flex-direction: column; gap: 8px; }
        .palette-title { color: #fff; font-size: 13px; text-align: center; margin-bottom: 5px; font-weight: bold;}
        .palette-grid { display: flex; flex-wrap: wrap; gap: 6px; justify-content: center; max-width: 260px; }
        .color-btn { width: 25px; height: 25px; border: 1px solid #555; border-radius: 4px; cursor: pointer; background: #222; display: flex; align-items: center; justify-content: center; transition: 0.2s; }
        .color-btn:hover { transform: scale(1.1); border-color: #fff; }
        .format-btn { background: #333; color: #fff; border: 1px solid #555; padding: 5px 10px; border-radius: 4px; font-size: 12px; cursor: pointer; transition: 0.2s;}
        .format-btn:hover { background: #555; }
        .root-add-group { margin-top: 20px; padding: 20px; background: rgba(0, 255, 255, 0.05); border: 1px solid var(--neon-cyan); border-radius: 8px; display: flex; flex-direction: column; gap: 10px; }
        .root-add-group span { color: var(--neon-cyan); font-weight: bold; font-size: 16px; }
    </style>
</head>
<body>
    <h1>RPG Config Editor</h1>
    <div class="container">
        <div class="controls">
            <label class="file-upload">📥 config.yml を読み込む<input type="file" id="fileInput" accept=".yml,.yaml"></label>
            <button class="main-btn download-btn" onclick="downloadYaml()">💾 編集してダウンロード</button>
        </div>
        <div id="editor" class="editor-area">
            <p style="text-align:center; color: #777; font-size: 18px;">上のボタンから <code>config.yml</code> を選択してください。</p>
        </div>
    </div>
    <div id="color-palette" class="color-palette">
        <div class="palette-title">装飾・カラーパレット<br><span style="font-size:10px;color:#aaa;">(入力中に押すとそのまま色が変わります)</span></div>
        <div class="palette-grid">
            <button type="button" class="color-btn" style="color:#AA0000; text-shadow:none;" onmousedown="handlePaletteClick(event, '4')">■</button>
            <button type="button" class="color-btn" style="color:#FF5555; text-shadow:none;" onmousedown="handlePaletteClick(event, 'c')">■</button>
            <button type="button" class="color-btn" style="color:#FFAA00; text-shadow:none;" onmousedown="handlePaletteClick(event, '6')">■</button>
            <button type="button" class="color-btn" style="color:#FFFF55; text-shadow:none;" onmousedown="handlePaletteClick(event, 'e')">■</button>
            <button type="button" class="color-btn" style="color:#00AA00; text-shadow:none;" onmousedown="handlePaletteClick(event, '2')">■</button>
            <button type="button" class="color-btn" style="color:#55FF55; text-shadow:none;" onmousedown="handlePaletteClick(event, 'a')">■</button>
            <button type="button" class="color-btn" style="color:#00AAAA; text-shadow:none;" onmousedown="handlePaletteClick(event, '3')">■</button>
            <button type="button" class="color-btn" style="color:#55FFFF; text-shadow:none;" onmousedown="handlePaletteClick(event, 'b')">■</button>
            <button type="button" class="color-btn" style="color:#0000AA; text-shadow:none;" onmousedown="handlePaletteClick(event, '1')">■</button>
            <button type="button" class="color-btn" style="color:#5555FF; text-shadow:none;" onmousedown="handlePaletteClick(event, '9')">■</button>
            <button type="button" class="color-btn" style="color:#AA00AA; text-shadow:none;" onmousedown="handlePaletteClick(event, '5')">■</button>
            <button type="button" class="color-btn" style="color:#FF55FF; text-shadow:none;" onmousedown="handlePaletteClick(event, 'd')">■</button>
            <button type="button" class="color-btn" style="color:#FFFFFF; text-shadow:none;" onmousedown="handlePaletteClick(event, 'f')">■</button>
            <button type="button" class="color-btn" style="color:#AAAAAA; text-shadow:none;" onmousedown="handlePaletteClick(event, '7')">■</button>
            <button type="button" class="color-btn" style="color:#555555; text-shadow:none;" onmousedown="handlePaletteClick(event, '8')">■</button>
            <button type="button" class="color-btn" style="color:#000000; text-shadow:1px 1px 0px #555; background:#ddd;" onmousedown="handlePaletteClick(event, '0')">■</button>
        </div>
        <div class="palette-grid" style="margin-top: 5px;">
            <button type="button" class="format-btn" onmousedown="handlePaletteClick(event, 'l')"><b>太字</b></button>
            <button type="button" class="format-btn" onmousedown="handlePaletteClick(event, 'm')"><s>取消線</s></button>
            <button type="button" class="format-btn" onmousedown="handlePaletteClick(event, 'n')"><u>下線</u></button>
            <button type="button" class="format-btn" onmousedown="handlePaletteClick(event, 'o')"><i>斜体</i></button>
            <button type="button" class="format-btn" onmousedown="handlePaletteClick(event, 'k')">難読化</button>
            <button type="button" class="format-btn" onmousedown="handlePaletteClick(event, 'r')">リセット</button>
        </div>
    </div>
    <script>
        let currentConfigObj = {};
        let lastFocusedElement = null;
        let savedRange = null;
        const bookPageStates = {};
        let historyStack = [];
        let historyIndex = -1;
        let isUndoRedoing = false;

        function saveHistory() {
            if (isUndoRedoing) return;
            const state = JSON.stringify(currentConfigObj);
            if (historyIndex >= 0 && historyStack[historyIndex] === state) return;
            historyStack = historyStack.slice(0, historyIndex + 1);
            historyStack.push(state);
            historyIndex++;
        }

        document.addEventListener('keydown', function(e) {
            if (e.ctrlKey || e.metaKey) {
                const key = e.key.toLowerCase();
                if (key === 'z' || key === 'y') {
                    const active = document.activeElement;
                    if (active && (active.tagName === 'INPUT' || active.tagName === 'TEXTAREA' || active.isContentEditable)) {
                        setTimeout(() => active.dispatchEvent(new Event('input')), 10);
                        return; 
                    }
                    e.preventDefault();
                    if (key === 'z' && historyIndex > 0) {
                        historyIndex--; isUndoRedoing = true; currentConfigObj = JSON.parse(historyStack[historyIndex]); refreshEditor(); isUndoRedoing = false;
                    } else if (key === 'y' && historyIndex < historyStack.length - 1) {
                        historyIndex++; isUndoRedoing = true; currentConfigObj = JSON.parse(historyStack[historyIndex]); refreshEditor(); isUndoRedoing = false;
                    }
                }
            }
        });

        document.addEventListener('selectionchange', () => {
            const sel = window.getSelection();
            if (sel.rangeCount > 0) {
                const active = document.activeElement;
                if (active && active.isContentEditable) { savedRange = sel.getRangeAt(0); lastFocusedElement = active; }
            }
        });

        const schema = {
            "": ["admin_player", "setting_world", "spawn_location", "development_mode", "test_players", "resource_pack", "level_system", "areas", "guide_book", "defined_items", "npcs", "quests", "mob_setting", "medals", "allowed_containers", "denied_fence_gates"],
            "level_system": ["required_xp_base", "required_xp_per_level", "title", "subtitle", "sound"],
            "resource_pack": ["url", "hash"],
            "guide_book": ["title", "author", "pages"],
            "areas.*": ["name", "subtitle", "world", "show_title", "range", "disable_mobs_after_clear", "night_vision", "mobs", "sub_areas"],
            "areas.*.sub_areas.*": ["name", "subtitle", "world", "show_title", "range", "disable_mobs_after_clear", "night_vision", "mobs", "inherit_mobs"],
            "areas.*.mobs.*": ["id", "level", "baby", "pos", "test"],
            "areas.*.sub_areas.*.mobs.*": ["id", "level", "baby", "pos", "test"],
            "defined_items.*": ["id", "name", "amount", "custom_model_data", "attack_damage", "attack_speed", "armor", "unbreakable", "durability", "initial_durability", "lore"],
            "npcs.*": ["name", "world", "locations", "yaw", "pitch", "items"],
            "npcs.*.items.*": ["id", "defined_id", "name", "price", "amount", "custom_model_data", "attack_damage", "attack_speed", "armor", "unbreakable", "durability", "initial_durability", "lore", "slot", "test"],
            "quests.*": ["title", "description", "name", "world", "locations", "yaw", "pitch", "disappear_after_talk", "hide_after_quest", "show_after_quest", "required_area", "dialogues_start", "dialogues_progress", "dialogues_clear", "dialogues_after_clear", "give_on_start", "requirements", "give_on_clear", "give_cash_on_start", "give_xp_on_start", "give_cash_on_clear", "give_xp_on_clear"],
            "mob_setting.*": ["follow_range", "xp", "clear_vanilla_drops", "items"],
            "mob_setting.*.items.*": ["id", "name", "lore", "amount_min", "amount_max", "amount", "max_level", "chance_base", "chance_max", "chance_per_mob_level", "custom_model_data", "attack_damage", "attack_speed", "armor", "unbreakable", "durability", "initial_durability"],
            "medals.*": ["name", "description", "type", "rarity", "condition", "condition_desc_locked", "condition_desc_unlocked", "location"]
        };

        function getSchemaKeys(path) {
            let schemaPath = path.map((p, i) => {
                if (path[0] === 'areas' && i === 1) return '*';
                if (path[0] === 'areas' && path[2] === 'sub_areas' && i === 3) return '*';
                if (path[0] === 'defined_items' && i === 1) return '*';
                if (path[0] === 'npcs' && i === 1) return '*';
                if (path[0] === 'quests' && i === 1) return '*';
                if (path[0] === 'mob_setting' && i === 1) return '*';
                if (path[0] === 'medals' && i === 1) return '*';
                if (path[0] === 'areas' && path[2] === 'mobs' && i === 3) return '*';
                if (path[0] === 'areas' && path[2] === 'sub_areas' && path[4] === 'mobs' && i === 5) return '*';
                if (path[0] === 'npcs' && path[2] === 'items' && i === 3) return '*';
                if (path[0] === 'mob_setting' && path[2] === 'items' && i === 3) return '*';
                return p;
            }).join('.');
            return schema[schemaPath] || [];
        }

        function getDefaultValueForKey(key) {
            const arrayKeys = ["test_players", "locations", "range", "mobs", "sub_areas", "lore", "items", "pages", "description", "dialogues_start", "dialogues_progress", "dialogues_clear", "dialogues_after_clear", "give_on_start", "requirements", "give_on_clear", "allowed_containers", "denied_fence_gates"];
            const boolKeys = ["enabled", "show_title", "disable_mobs_after_clear", "night_vision", "inherit_mobs", "disappear_after_talk", "unbreakable", "baby", "test", "clear_vanilla_drops", "development_mode"];
            const numberKeys = ["required_xp_base", "required_xp_per_level", "amount", "custom_model_data", "attack_damage", "attack_speed", "armor", "durability", "initial_durability", "price", "slot", "yaw", "pitch", "give_cash_on_start", "give_xp_on_start", "give_cash_on_clear", "give_xp_on_clear", "level", "rarity", "xp", "amount_min", "amount_max", "max_level", "chance_base", "chance_max", "chance_per_mob_level"];
            const stringKeys = ["admin_player", "setting_world", "spawn_location", "url", "hash", "title", "subtitle", "sound", "author", "name", "world", "id", "defined_id", "hide_after_quest", "show_after_quest", "required_area", "teleport_to", "type", "condition", "condition_desc_locked", "condition_desc_unlocked", "location"];
            
            if (arrayKeys.includes(key)) return [];
            if (boolKeys.includes(key)) return false;
            if (numberKeys.includes(key)) return 0;
            if (stringKeys.includes(key)) return "";
            return {}; 
        }

        document.getElementById('fileInput').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    currentConfigObj = jsyaml.load(e.target.result) || {};
                    saveHistory(); refreshEditor();
                } catch (err) { alert("YAMLの解析に失敗しました: " + err.message); }
            };
            reader.readAsText(file);
        });

        function refreshEditor() {
            const editor = document.getElementById('editor');
            editor.innerHTML = '';
            renderEditor(currentConfigObj, editor, []);

            const addKeyGroup = document.createElement('div');
            addKeyGroup.className = 'root-add-group';
            const title = document.createElement('span');
            title.textContent = '▼ 新しい全体設定（spawn_locationなど）を追加';
            addKeyGroup.appendChild(title);

            const inputWrapper = document.createElement('div');
            inputWrapper.className = 'add-key-group';
            inputWrapper.style.marginTop = '0';

            const availableKeys = getSchemaKeys([]);
            const existingKeys = Object.keys(currentConfigObj);
            let keyInput = null;

            if (availableKeys.length > 0) {
                const remainingKeys = availableKeys.filter(k => !existingKeys.includes(k));
                if (remainingKeys.length > 0) {
                    keyInput = document.createElement('select');
                    const defaultOpt = document.createElement('option');
                    defaultOpt.value = ""; defaultOpt.textContent = "-- 追加する項目を選択 --";
                    keyInput.appendChild(defaultOpt);
                    remainingKeys.forEach(k => {
                        const opt = document.createElement('option');
                        opt.value = k; opt.textContent = k;
                        keyInput.appendChild(opt);
                    });
                } else {
                    const noOpt = document.createElement('span');
                    noOpt.textContent = "全体設定の項目はすべて追加済みです。";
                    noOpt.style.color = "#777";
                    inputWrapper.appendChild(noOpt);
                }
            } else {
                keyInput = document.createElement('input');
                keyInput.type = 'text';
                keyInput.placeholder = '新規項目名を入力';
            }

            if (keyInput) {
                const addKeyBtn = document.createElement('button');
                addKeyBtn.className = 'action-btn add-btn';
                addKeyBtn.textContent = '＋ 追加';
                addKeyBtn.style.marginTop = '0';
                addKeyBtn.onclick = () => {
                    const newKey = keyInput.value.trim();
                    if (newKey && !currentConfigObj.hasOwnProperty(newKey)) {
                        currentConfigObj[newKey] = (availableKeys.includes(newKey) || availableKeys.length === 0) ? getDefaultValueForKey(newKey) : {};
                        saveHistory();
                        refreshEditor();
                    }
                };
                inputWrapper.appendChild(keyInput);
                inputWrapper.appendChild(addKeyBtn);
            }
            
            addKeyGroup.appendChild(inputWrapper);
            editor.appendChild(addKeyGroup);
        }

        const mcHexColors = {
            '0': '#000000', '1': '#0000aa', '2': '#00aa00', '3': '#00aaaa', '4': '#aa0000', '5': '#aa00aa', '6': '#ffaa00', '7': '#aaaaaa', '8': '#555555', '9': '#5555ff', 'a': '#55ff55', 'b': '#55ffff', 'c': '#ff5555', 'd': '#ff55ff', 'e': '#ffff55', 'f': '#ffffff'
        };

        function minecraftToHtml(text) {
            if (text == null || text === "") return "";
            let color = "#ffffff", bold = false, italic = false, under = false, strike = false, obf = false;
            let chars = String(text).split('');
            let output = "", spanOpen = false;
            function openSpan() {
                let style = `color:${color};`;
                if (bold) style += "font-weight:bold;";
                if (italic) style += "font-style:italic;";
                if (under && strike) style += "text-decoration:underline line-through;";
                else if (under) style += "text-decoration:underline;";
                else if (strike) style += "text-decoration:line-through;";
                return `<span style="${style}" class="${obf ? "mc-obf" : ""}">`;
            }
            for (let i = 0; i < chars.length; i++) {
                if (chars[i] === '§' && i + 1 < chars.length) {
                    let code = chars[i+1].toLowerCase(); i++;
                    if (spanOpen) { output += "</span>"; spanOpen = false; }
                    if (mcHexColors[code]) { color = mcHexColors[code]; bold = italic = under = strike = obf = false; } 
                    else if (code === 'l') bold = true; else if (code === 'o') italic = true; else if (code === 'n') under = true; else if (code === 'm') strike = true; else if (code === 'k') obf = true;
                    else if (code === 'r') { color = "#ffffff"; bold = italic = under = strike = obf = false; }
                    output += openSpan(); spanOpen = true;
                } else {
                    if (!spanOpen) { output += openSpan(); spanOpen = true; }
                    if (chars[i] === '\n') output += "<br>"; else output += chars[i].replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
                }
            }
            if (spanOpen) output += "</span>";
            return output;
        }

        function htmlToMinecraft(element) {
            let out = "";
            function rgb2hex(rgb) {
                if(rgb.startsWith('#')) return rgb;
                let m = rgb.match(/rgb\((\d+),\s*(\d+),\s*(\d+)\)/);
                if(!m) return null;
                return "#" + ("0" + parseInt(m[1]).toString(16)).slice(-2) + ("0" + parseInt(m[2]).toString(16)).slice(-2) + ("0" + parseInt(m[3]).toString(16)).slice(-2);
            }
            function hexToCode(hex) {
                for(let k in mcHexColors) { if(mcHexColors[k] === hex) return k; } return null;
            }
            function walk(node, currentStyles) {
                if (node.nodeType === 3) { out += node.nodeValue.replace(/\u00A0/g, ' ').replace(/\u200B/g, ''); return; }
                if (node.nodeType === 1) { 
                    if (node.tagName === 'BR') { out += '\n'; return; }
                    if (node.tagName === 'DIV' && out.length > 0 && !out.endsWith('\n')) { out += '\n'; }
                    let newStyles = { ...currentStyles }; let styleStr = "";
                    const color = node.style.color || (node.tagName === 'FONT' ? node.color : null);
                    if (color) {
                        let code = hexToCode(rgb2hex(color));
                        if (code && code !== newStyles.colorCode) { newStyles.colorCode = code; styleStr += "§" + code; }
                    }
                    if ((node.tagName === 'B' || node.style.fontWeight === 'bold' || parseInt(node.style.fontWeight)>=700) && !newStyles.bold) { newStyles.bold = true; styleStr += "§l"; }
                    if ((node.tagName === 'I' || node.style.fontStyle === 'italic') && !newStyles.italic) { newStyles.italic = true; styleStr += "§o"; }
                    if ((node.tagName === 'U' || node.style.textDecoration.includes('underline')) && !newStyles.underline) { newStyles.underline = true; styleStr += "§n"; }
                    if ((node.tagName === 'STRIKE' || node.style.textDecoration.includes('line-through')) && !newStyles.strike) { newStyles.strike = true; styleStr += "§m"; }
                    out += styleStr;
                    for (let i = 0; i < node.childNodes.length; i++) walk(node.childNodes[i], newStyles);
                    if (styleStr.length > 0) {
                        out += "§r";
                        if (currentStyles.colorCode && currentStyles.colorCode !== 'f') out += "§" + currentStyles.colorCode;
                        if (currentStyles.bold) out += "§l"; if (currentStyles.italic) out += "§o"; if (currentStyles.underline) out += "§n"; if (currentStyles.strike) out += "§m";
                    }
                }
            }
            walk(element, {colorCode: 'f', bold: false, italic: false, underline: false, strike: false});
            return out.replace(/(§r)+/g, '§r').replace(/§r$/g, '');
        }

        function createMcField(val, onUpdate, isMultiline = false) {
            const container = document.createElement('div');
            container.className = 'mc-field-container';
            const editor = document.createElement('div');
            editor.className = 'rich-mc-editor'; editor.contentEditable = "true";
            if (isMultiline) editor.classList.add('multiline');
            editor.innerHTML = minecraftToHtml(val);
            if (!isMultiline) {
                editor.addEventListener('keydown', (e) => { if (e.key === 'Enter') { e.preventDefault(); editor.blur(); }});
            }
            editor.addEventListener('focus', () => { lastFocusedElement = editor; });
            editor.addEventListener('input', () => { onUpdate(htmlToMinecraft(editor)); });
            editor.addEventListener('blur', () => { saveHistory(); });
            container.appendChild(editor); return container;
        }

        function createMcArrayField(valArr, onUpdate) {
            return createMcField(valArr.join('\n'), (newVal) => {
                const newArr = newVal.split('\n');
                if (newArr.length > 0 && newArr[newArr.length - 1] === "") newArr.pop();
                onUpdate(newArr);
            }, true);
        }

        function handlePaletteClick(event, code) {
            event.preventDefault(); 
            if (!lastFocusedElement || !lastFocusedElement.isContentEditable) { alert("色を変えたい文字の場所をクリックしてから使用してください。"); return; }
            lastFocusedElement.focus();
            const sel = window.getSelection();
            if (savedRange && lastFocusedElement.contains(savedRange.commonAncestorContainer)) {
                sel.removeAllRanges(); sel.addRange(savedRange);
            }
            const hex = mcHexColors[code];
            if (sel.isCollapsed) {
                const span = document.createElement('span');
                span.innerHTML = '&#8203;'; 
                if (hex) span.style.color = hex;
                else {
                    if (code === 'l') span.style.fontWeight = 'bold';
                    if (code === 'o') span.style.fontStyle = 'italic';
                    if (code === 'n') span.style.textDecoration = 'underline';
                    if (code === 'm') span.style.textDecoration = 'line-through';
                }
                const range = sel.getRangeAt(0); range.insertNode(span);
                range.setStart(span.firstChild, 1); range.collapse(true);
                sel.removeAllRanges(); sel.addRange(range);
            } else {
                if (hex) { document.execCommand('styleWithCSS', false, true); document.execCommand('foreColor', false, hex); }
                else {
                    switch(code) {
                        case 'l': document.execCommand('bold', false, null); break;
                        case 'o': document.execCommand('italic', false, null); break;
                        case 'n': document.execCommand('underline', false, null); break;
                        case 'm': document.execCommand('strikeThrough', false, null); break;
                        case 'r': document.execCommand('removeFormat', false, null); document.execCommand('foreColor', false, '#ffffff'); break;
                    }
                }
            }
            lastFocusedElement.dispatchEvent(new Event('input')); 
            if (sel.rangeCount > 0) savedRange = sel.getRangeAt(0);
        }

        function renderEditor(obj, container, path) {
            for (const key in obj) {
                const val = obj[key]; const currentPath = [...path, key];
                const pairDiv = document.createElement('div'); pairDiv.className = 'kv-pair';
                const headerDiv = document.createElement('div'); headerDiv.className = 'key-header';
                const label = document.createElement('div'); label.className = 'key-label'; label.textContent = key;
                headerDiv.appendChild(label);

                if (path.length > 0) {
                    const delBtn = document.createElement('button');
                    delBtn.className = 'action-btn del-btn'; delBtn.textContent = '削除';
                    delBtn.onclick = () => {
                        if (confirm(`キー '${key}' とその中のすべての設定を削除しますか？`)) {
                            delete obj[key]; saveHistory(); refreshEditor();
                        }
                    };
                    headerDiv.appendChild(delBtn);
                }
                pairDiv.appendChild(headerDiv);

                if (currentPath.join('.') === 'guide_book.pages') {
                    renderBookUI(val, pairDiv, currentPath); container.appendChild(pairDiv); continue; 
                }

                if (typeof val === 'object' && val !== null && !Array.isArray(val)) {
                    const nestedDiv = document.createElement('div'); nestedDiv.className = 'nested';
                    renderEditor(val, nestedDiv, currentPath);
                    const addKeyGroup = document.createElement('div'); addKeyGroup.className = 'add-key-group';
                    const availableKeys = getSchemaKeys(currentPath);
                    const existingKeys = Object.keys(val);
                    let keyInput = null;

                    if (availableKeys.length > 0) {
                        const remainingKeys = availableKeys.filter(k => !existingKeys.includes(k));
                        if (remainingKeys.length > 0) {
                            keyInput = document.createElement('select');
                            const defaultOpt = document.createElement('option'); defaultOpt.value = ""; defaultOpt.textContent = "-- 追加するキーを選択 --"; keyInput.appendChild(defaultOpt);
                            remainingKeys.forEach(k => {
                                const opt = document.createElement('option'); opt.value = k; opt.textContent = k; keyInput.appendChild(opt);
                            });
                        } else {
                            const noOpt = document.createElement('span'); noOpt.textContent = "追加できるキーはすべて設定済みです。"; noOpt.style.color = "#777"; addKeyGroup.appendChild(noOpt);
                        }
                    } else {
                        keyInput = document.createElement('input'); keyInput.type = 'text'; keyInput.placeholder = '新規ID / 名前 を入力';
                    }

                    if (keyInput) {
                        const addKeyBtn = document.createElement('button'); addKeyBtn.className = 'action-btn add-btn'; addKeyBtn.textContent = '＋ 追加';
                        addKeyBtn.onclick = () => {
                            const newKey = keyInput.value.trim();
                            if (newKey && !val.hasOwnProperty(newKey)) {
                                val[newKey] = (availableKeys.includes(newKey) || availableKeys.length === 0) ? getDefaultValueForKey(newKey) : {};
                                saveHistory(); refreshEditor();
                            }
                        };
                        addKeyGroup.appendChild(keyInput); addKeyGroup.appendChild(addKeyBtn);
                    }
                    nestedDiv.appendChild(addKeyGroup); pairDiv.appendChild(nestedDiv);

                } else if (Array.isArray(val)) {
                    let isObjectArray = (val.length > 0 && typeof val[0] === 'object' && val[0] !== null);
                    if (val.length === 0) {
                        const objArrayKeys = ['mobs', 'items', 'requirements', 'give_on_start', 'give_on_clear', 'sub_areas'];
                        if (objArrayKeys.includes(key)) isObjectArray = true;
                    }

                    if (isObjectArray) {
                        const arrayContainer = document.createElement('div'); arrayContainer.className = 'nested';
                        val.forEach((itemObj, index) => {
                            const itemDiv = document.createElement('div'); itemDiv.className = 'array-item';
                            const arrHeader = document.createElement('div'); arrHeader.className = 'array-header'; arrHeader.innerHTML = `<span>[ リスト項目 ${index + 1} ]</span>`;
                            const arrDelBtn = document.createElement('button'); arrDelBtn.className = 'action-btn del-btn'; arrDelBtn.textContent = '削除';
                            arrDelBtn.onclick = () => {
                                if (confirm(`リスト項目 ${index + 1} を削除しますか？`)) { val.splice(index, 1); saveHistory(); refreshEditor(); }
                            };
                            arrHeader.appendChild(arrDelBtn); itemDiv.appendChild(arrHeader);
                            const contentDiv = document.createElement('div'); renderEditor(itemObj, contentDiv, [...currentPath, index]);
                            itemDiv.appendChild(contentDiv); arrayContainer.appendChild(itemDiv);
                        });
                        
                        const addBtn = document.createElement('button'); addBtn.className = 'action-btn add-btn'; addBtn.textContent = '＋ リスト項目を追加';
                        addBtn.onclick = () => {
                            const elementPath = [...currentPath, "0"]; const elementKeys = getSchemaKeys(elementPath); let newObj = {};
                            if (elementKeys.length > 0) { elementKeys.forEach(k => newObj[k] = getDefaultValueForKey(k)); } 
                            else if (val.length > 0) {
                                for(let k in val[0]) {
                                    if(typeof val[0][k] === 'number') newObj[k] = 0; else if(typeof val[0][k] === 'boolean') newObj[k] = false; else if(Array.isArray(val[0][k])) newObj[k] = []; else newObj[k] = "";
                                }
                            } else { newObj = { id: "" }; }
                            val.push(newObj); saveHistory(); refreshEditor();
                        };
                        arrayContainer.appendChild(addBtn); pairDiv.appendChild(arrayContainer);
                    } else {
                        pairDiv.appendChild(createMcArrayField(val, (newArr) => { updateValue(currentPath, newArr); }));
                    }
                } else {
                    if (typeof val === 'boolean') {
                        const select = document.createElement('select');
                        const optTrue = document.createElement('option'); optTrue.value = "true"; optTrue.textContent = "true (有効)";
                        const optFalse = document.createElement('option'); optFalse.value = "false"; optFalse.textContent = "false (無効)";
                        select.appendChild(optTrue); select.appendChild(optFalse); select.value = val.toString();
                        select.onchange = (e) => { updateValue(currentPath, e.target.value === "true"); saveHistory(); };
                        pairDiv.appendChild(select);
                    } else if (typeof val === 'number') {
                        const input = document.createElement('input'); input.type = 'number'; input.value = val;
                        input.onchange = (e) => { updateValue(currentPath, Number(e.target.value)); saveHistory(); };
                        pairDiv.appendChild(input);
                    } else {
                        pairDiv.appendChild(createMcField(val, (newVal) => { updateValue(currentPath, newVal); }));
                    }
                }
                container.appendChild(pairDiv);
            }
        }

        function renderBookUI(pagesArray, container, path) {
            const bookContainer = document.createElement('div'); bookContainer.className = 'book-container';
            const stateKey = path.join('.'); let currentPageIndex = bookPageStates[stateKey] || 0;
            if (pagesArray.length === 0) pagesArray.push("");
            if (currentPageIndex >= pagesArray.length) currentPageIndex = Math.max(0, pagesArray.length - 1);

            const header = document.createElement('div'); header.className = 'book-header'; header.innerHTML = `<span>📖 ガイドブック編集</span>`;
            const contentArea = document.createElement('div');
            const controls = document.createElement('div'); controls.className = 'book-controls';
            
            const prevBtn = document.createElement('button'); prevBtn.innerHTML = "◀ 前のページ";
            const nextBtn = document.createElement('button'); nextBtn.innerHTML = "次のページ ▶";
            const pageInfo = document.createElement('span'); pageInfo.className = 'book-page-info';
            const addPageBtn = document.createElement('button'); addPageBtn.textContent = "＋ 新規ページ";
            const delPageBtn = document.createElement('button'); delPageBtn.textContent = "🗑 削除";

            function updateBookView() {
                contentArea.innerHTML = '';
                const field = createMcField(pagesArray[currentPageIndex].replace(/\\n/g, '\n'), (newVal) => {
                    pagesArray[currentPageIndex] = newVal.replace(/\n/g, '\\n'); updateValue(path, pagesArray);
                }, true);
                field.querySelector('.rich-mc-editor').style.minHeight = '200px'; contentArea.appendChild(field);
                pageInfo.textContent = `ページ ${currentPageIndex + 1} / ${pagesArray.length}`;
                prevBtn.disabled = currentPageIndex === 0; nextBtn.disabled = currentPageIndex === pagesArray.length - 1; delPageBtn.disabled = pagesArray.length <= 1;
            }

            prevBtn.onclick = () => { if(currentPageIndex > 0) { currentPageIndex--; bookPageStates[stateKey] = currentPageIndex; updateBookView(); } };
            nextBtn.onclick = () => { if(currentPageIndex < pagesArray.length - 1) { currentPageIndex++; bookPageStates[stateKey] = currentPageIndex; updateBookView(); } };
            addPageBtn.onclick = () => { pagesArray.splice(currentPageIndex + 1, 0, ""); currentPageIndex++; bookPageStates[stateKey] = currentPageIndex; updateValue(path, pagesArray); saveHistory(); updateBookView(); };
            delPageBtn.onclick = () => { 
                if(confirm(`ページ ${currentPageIndex + 1} を削除しますか？`)) {
                    pagesArray.splice(currentPageIndex, 1); 
                    if(currentPageIndex >= pagesArray.length) currentPageIndex = Math.max(0, pagesArray.length - 1);
                    bookPageStates[stateKey] = currentPageIndex; updateValue(path, pagesArray); saveHistory(); updateBookView(); 
                }
            };

            controls.append(prevBtn, pageInfo, nextBtn, addPageBtn, delPageBtn); bookContainer.append(header, contentArea, controls); container.appendChild(bookContainer); updateBookView();
        }

        function updateValue(path, value) {
            let ref = currentConfigObj;
            for (let i = 0; i < path.length - 1; i++) { ref = ref[path[i]]; }
            ref[path[path.length - 1]] = value;
        }

        function downloadYaml() {
            if (Object.keys(currentConfigObj).length === 0) { alert("ダウンロードするデータがありません。ファイルを読み込んでください。"); return; }
            const yamlStr = jsyaml.dump(currentConfigObj, { indent: 2, lineWidth: -1, noRefs: true, quotingType: '"' });
            const blob = new Blob([yamlStr], {type: "text/yaml"}); const url = URL.createObjectURL(blob);
            const a = document.createElement('a'); a.href = url; a.download = "config.yml";
            document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url);
        }
    </script>
